spring:
  application:
    name: order-service

  datasource:
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false

services:
  product-service:
    base-url: ${PRODUCT_SERVICE_BASE_URL:http://localhost:8081}
    connect-timeout-ms: ${PRODUCT_SERVICE_CONNECT_TIMEOUT_MS:2000}
    read-timeout-ms: ${PRODUCT_SERVICE_READ_TIMEOUT_MS:3000}

resilience4j:
  retry:
    instances:
      productService:
        max-attempts: ${PRODUCT_SERVICE_RETRY_MAX_ATTEMPTS:3}
        wait-duration: ${PRODUCT_SERVICE_RETRY_WAIT_DURATION:500ms}
        retry-exceptions:
          - za.co.pixelly.order.service.exception.ProductServiceException
        ignore-exceptions:
          - za.co.pixelly.order.service.exception.ProductNotFoundException
          - za.co.pixelly.order.service.exception.InsufficientStockException

  circuitbreaker:
    instances:
      productService:
        register-health-indicator: true
        sliding-window-type: COUNT_BASED
        sliding-window-size: ${PRODUCT_SERVICE_CB_SLIDING_WINDOW_SIZE:5}
        minimum-number-of-calls: ${PRODUCT_SERVICE_CB_MINIMUM_CALLS:5}
        failure-rate-threshold: ${PRODUCT_SERVICE_CB_FAILURE_RATE_THRESHOLD:50}
        wait-duration-in-open-state: ${PRODUCT_SERVICE_CB_WAIT_OPEN:10s}
        permitted-number-of-calls-in-half-open-state: ${PRODUCT_SERVICE_CB_HALF_OPEN_CALLS:2}
        automatic-transition-from-open-to-half-open-enabled: true
        record-exceptions:
          - za.co.pixelly.order.service.exception.ProductServiceException
        ignore-exceptions:
          - za.co.pixelly.order.service.exception.ProductNotFoundException
          - za.co.pixelly.order.service.exception.InsufficientStockException

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

logging:
  pattern:
    level: "%5p [correlationId=%X{correlationId}]"

server:
  port: ${PORT:8080}
