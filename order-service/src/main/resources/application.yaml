spring:
  application:
    name: order-service

  datasource:
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false

services:
  product-service:
    base-url: ${PRODUCT_SERVICE_BASE_URL:http://localhost:8081}

server:
  port: ${PORT:8080}